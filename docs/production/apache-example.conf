# Apache Reverse Proxy Configuration for VISTA
#
# This configuration uses two Location blocks to support two auth methods
# without any conditional logic:
#
# 1. /api/  -- OpenID Connect (browser users)
#    - Apache authenticates via mod_auth_openidc
#    - Injects X-User-Email + X-Proxy-Secret headers
#
# 2. /ext/  -- API Keys (scripts, automation, ML pipelines)
#    - No authentication at the proxy layer
#    - Client sends: Authorization: Bearer <api-key>
#    - Apache rewrites /ext/api/... -> /api/... via ProxyPass path mapping
#    - Backend validates the API key directly
#
# The backend only sees /api/... requests.  It has no knowledge of /ext/.
#
# Required modules:
#   mod_auth_openidc, mod_proxy, mod_proxy_http, mod_headers,
#   mod_ssl, mod_rewrite

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------

<VirtualHost *:80>
    ServerName yourdomain.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------

<VirtualHost *:443>
    ServerName yourdomain.com

    # --- TLS ---
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/yourdomain.com.crt
    SSLCertificateKeyFile /etc/ssl/private/yourdomain.com.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1

    # --- Security headers ---
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"

    # --- Logging ---
    ErrorLog  /var/log/httpd/vista-error.log
    CustomLog /var/log/httpd/vista-access.log combined

    # --- Proxy settings ---
    ProxyPreserveHost On
    ProxyTimeout 300

    # Allow large uploads (100 MB)
    LimitRequestBody 104857600

    # -----------------------------------------------------------------------
    # OpenID Connect configuration (mod_auth_openidc)
    # -----------------------------------------------------------------------
    # Replace these values with your identity provider's settings.

    OIDCProviderMetadataURL https://auth.example.com/.well-known/openid-configuration
    OIDCClientID            your-client-id
    OIDCClientSecret        your-client-secret
    OIDCRedirectURI         https://yourdomain.com/oauth2callback
    OIDCCryptoPassphrase    <generate-random-passphrase>
    OIDCScope               "openid email"
    OIDCRemoteUserClaim     email

    # Session settings
    OIDCSessionInactivityTimeout 3600
    OIDCSessionMaxDuration       28800

    # -----------------------------------------------------------------------
    # Health endpoint -- no authentication
    # -----------------------------------------------------------------------

    <Location /api/health>
        Require all granted
        ProxyPass        http://localhost:8000/api/health
        ProxyPassReverse http://localhost:8000/api/health
    </Location>

    # -----------------------------------------------------------------------
    # API endpoints -- OAuth required (browser users)
    # -----------------------------------------------------------------------

    <Location /api/>
        AuthType openid-connect
        Require valid-user

        # Inject proxy headers from OIDC claims.
        RequestHeader set X-User-Email   "%{OIDC_CLAIM_email}e"
        RequestHeader set X-Proxy-Secret "YOUR_SHARED_SECRET_HERE"

        # Strip Authorization to prevent browser-sent Bearer tokens from
        # overriding proxy auth (get_current_user checks Bearer first).
        RequestHeader unset Authorization

        ProxyPass        http://localhost:8000/api/
        ProxyPassReverse http://localhost:8000/api/
    </Location>

    # -----------------------------------------------------------------------
    # Frontend -- always require OIDC
    # -----------------------------------------------------------------------
    # Listed before /ext/ because Apache applies the last matching
    # <Location> block.  The more-specific /ext/ block below overrides
    # this for /ext/... requests.

    <Location />
        AuthType openid-connect
        Require valid-user

        RequestHeader set X-User-Email   "%{OIDC_CLAIM_email}e"
        RequestHeader set X-Proxy-Secret "YOUR_SHARED_SECRET_HERE"

        # Strip Authorization to prevent browser-sent Bearer tokens from
        # overriding proxy auth.
        RequestHeader unset Authorization

        ProxyPass        http://localhost:8000/
        ProxyPassReverse http://localhost:8000/
    </Location>

    # -----------------------------------------------------------------------
    # External API access -- no auth (scripts, automation, ML pipelines)
    # -----------------------------------------------------------------------
    # Requests to /ext/api/... are mapped to http://localhost:8000/api/...
    # by the ProxyPass path mapping.  The backend never sees /ext/.
    # Listed after <Location /> so it overrides the OIDC requirement.
    #
    # Usage:
    #   curl -H "Authorization: Bearer <api-key>" \
    #        https://yourdomain.com/ext/api/projects

    <Location /ext/>
        Require all granted

        # Forward the Authorization header to the backend.
        RequestHeader set Authorization "%{HTTP_AUTHORIZATION}e"

        # Clear proxy headers to prevent clients from injecting them.
        RequestHeader unset X-User-Email
        RequestHeader unset X-Proxy-Secret

        # The path mapping strips /ext/:
        # /ext/api/projects -> http://localhost:8000/api/projects
        ProxyPass        http://localhost:8000/
        ProxyPassReverse http://localhost:8000/
    </Location>

    # -----------------------------------------------------------------------
    # Static assets -- cache headers
    # -----------------------------------------------------------------------

    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # -----------------------------------------------------------------------
    # API documentation (optional: remove auth)
    # -----------------------------------------------------------------------

    <LocationMatch "^/(docs|redoc|openapi\.json)">
        # Uncomment to make docs public:
        # AuthType None
        # Require all granted

        ProxyPass        http://localhost:8000/
        ProxyPassReverse http://localhost:8000/
    </LocationMatch>
</VirtualHost>

# ===========================================================================
# HOW IT WORKS
# ===========================================================================
#
# Two separate Location blocks handle two auth methods:
#
# /api/ (OAuth path):
#   mod_auth_openidc runs the OIDC flow.  On success, RequestHeader
#   injects X-User-Email (from the OIDC email claim) and X-Proxy-Secret.
#   The backend uses proxy auth (get_current_user checks headers).
#
# /ext/ (API key path):
#   No authentication at the proxy layer (Require all granted).
#   The Authorization header passes through to the backend unchanged.
#   ProxyPass maps /ext/api/... to http://localhost:8000/api/..., so the
#   backend only sees /api/... paths.  The backend validates the API key
#   directly (get_current_user checks Bearer first).
#
# The backend has no knowledge of /ext/.  It always sees /api/... requests.
#
# ===========================================================================
# TESTING
# ===========================================================================
#
# Test OIDC (browser):
#   Open https://yourdomain.com in a browser.
#   Should redirect to your identity provider, then show the app.
#
# Test API key (script):
#   curl -H "Authorization: Bearer YOUR_API_KEY" \
#        https://yourdomain.com/ext/api/projects
#   Should return 200 with no OIDC redirect.
#
# Test health (no auth):
#   curl https://yourdomain.com/api/health
#   Should return 200.
#
# Test privilege boundary:
#   curl -H "Authorization: Bearer YOUR_API_KEY" \
#        -X POST https://yourdomain.com/ext/api/api-keys \
#        -H "Content-Type: application/json" -d '{"name": "test"}'
#   Should return 403 (API keys cannot create API keys).
#
# Verify config:
#   apachectl configtest
#
# ===========================================================================
# CHOOSING A DIFFERENT PREFIX
# ===========================================================================
#
# The /ext/ prefix is just a suggestion.  You can use any prefix:
#   /token/    -- token-based access
#   /key/      -- API key access
#   /v1/       -- versioned external API
#
# Update the <Location /ext/> block name and ProxyPass accordingly.
#
# ===========================================================================
# ALTERNATIVE: LDAP Authentication
# ===========================================================================
#
# Replace the OIDC blocks with LDAP for the /api/ location:
#
# <Location /api/>
#     AuthType Basic
#     AuthName "VISTA"
#     AuthBasicProvider ldap
#     AuthLDAPURL "ldap://ldap.example.com:389/DC=example,DC=com?mail?sub?(objectClass=person)"
#     AuthLDAPBindDN "CN=apache,OU=Service Accounts,DC=example,DC=com"
#     AuthLDAPBindPassword "password"
#     Require valid-user
#
#     RequestHeader set X-User-Email   "%{AUTHENTICATE_mail}e"
#     RequestHeader set X-Proxy-Secret "YOUR_SHARED_SECRET_HERE"
#
#     ProxyPass        http://localhost:8000/api/
#     ProxyPassReverse http://localhost:8000/api/
# </Location>
#
# The /ext/ block stays exactly the same -- it has no authentication.
