# Nginx Reverse Proxy Configuration for VISTA
#
# This configuration uses two location prefixes to support two auth methods
# without any conditional logic:
#
# 1. /api/  -- OAuth2 (browser users)
#    - nginx authenticates via oauth2-proxy (port 4180)
#    - Injects X-User-Email + X-Proxy-Secret headers
#    - Backend resolves user from headers
#
# 2. /ext/  -- API Keys (scripts, automation, ML pipelines)
#    - No OAuth at the proxy layer
#    - Client sends: Authorization: Bearer <api-key>
#    - nginx rewrites /ext/api/... -> /api/... and forwards to backend
#    - Backend resolves user from API key
#
# The backend only sees /api/... requests.  It has no knowledge of /ext/.

# ---------------------------------------------------------------------------
# Upstream & rate limiting
# ---------------------------------------------------------------------------

upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Separate rate-limit zones for each auth method.
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=ext_limit:10m    rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # --- TLS ---
    ssl_certificate     /etc/ssl/certs/yourdomain.com.crt;
    ssl_certificate_key /etc/ssl/private/yourdomain.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "no-referrer" always;

    # --- Logging ---
    access_log /var/log/nginx/vista-access.log combined;
    error_log  /var/log/nginx/vista-error.log warn;

    # --- Client limits ---
    client_max_body_size    100M;
    client_body_timeout     300s;
    client_body_buffer_size 128k;
    proxy_buffers           4 256k;
    proxy_buffer_size       128k;

    # -----------------------------------------------------------------------
    # OAuth2 proxy (running on port 4180)
    # -----------------------------------------------------------------------
    # If you use a different auth provider (Keycloak, Authelia, etc.),
    # replace these two location blocks with your provider's equivalent.

    location /oauth2/ {
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Scheme   $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    location = /oauth2/auth {
        internal;
        proxy_pass       http://127.0.0.1:4180;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Original-URI $request_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # -----------------------------------------------------------------------
    # Health check -- no authentication
    # -----------------------------------------------------------------------

    location = /api/health {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Image content via OAuth -- higher timeouts for large downloads
    # -----------------------------------------------------------------------
    # Matches /api/images/{id}/* endpoints (download, thumbnail, content).
    # Image uploads (POST /api/projects/{id}/images) match the generic
    # /api/ block below, not this one.

    location /api/images {
        limit_req zone=upload_limit burst=5 nodelay;

        auth_request     /oauth2/auth;
        auth_request_set $user_email $upstream_http_x_auth_request_email;

        proxy_set_header X-User-Email   $user_email;
        proxy_set_header X-Proxy-Secret "YOUR_SHARED_SECRET_HERE";
        # Strip Authorization to prevent browser-sent Bearer tokens from
        # overriding proxy auth (get_current_user checks Bearer first).
        proxy_set_header Authorization  "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     600s;
        proxy_read_timeout     600s;
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_request_buffering off;
        proxy_pass http://backend;
    }

    # -----------------------------------------------------------------------
    # All other API endpoints -- OAuth required (browser users)
    # -----------------------------------------------------------------------

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        auth_request     /oauth2/auth;
        auth_request_set $user_email    $upstream_http_x_auth_request_email;
        auth_request_set $auth_cookie   $upstream_http_set_cookie;
        add_header       Set-Cookie     $auth_cookie;

        proxy_set_header X-User-Email   $user_email;
        proxy_set_header X-Proxy-Secret "YOUR_SHARED_SECRET_HERE";
        # Strip Authorization to prevent browser-sent Bearer tokens from
        # overriding proxy auth (get_current_user checks Bearer first).
        proxy_set_header Authorization  "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_request_buffering off;
        proxy_pass    http://backend;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # Image content via /ext/ -- higher timeouts for large downloads
    # -----------------------------------------------------------------------
    # Matches /ext/api/images/{id}/* (download, thumbnail, content).
    # More specific than /ext/, so listed first by convention.
    # Image uploads (POST /ext/api/projects/{id}/images) match the
    # generic /ext/ block below, not this one.

    location /ext/api/images {
        limit_req zone=upload_limit burst=5 nodelay;

        # No auth_request -- the backend validates the Bearer token.
        proxy_set_header Authorization     $http_authorization;
        # Clear proxy headers to prevent clients from injecting them.
        proxy_set_header X-User-Email      "";
        proxy_set_header X-Proxy-Secret    "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     600s;
        proxy_read_timeout     600s;
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_request_buffering off;

        # Rewrite: /ext/api/images/... -> /api/images/...
        proxy_pass    http://backend/api/images;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # External API access -- no OAuth (scripts, automation, ML pipelines)
    # -----------------------------------------------------------------------
    # Requests to /ext/api/... are rewritten to /api/... by the trailing
    # slash on proxy_pass.  The backend never sees /ext/.
    #
    # Usage:
    #   curl -H "Authorization: Bearer <api-key>" \
    #        https://yourdomain.com/ext/api/projects

    location /ext/ {
        limit_req zone=ext_limit burst=20 nodelay;

        # No auth_request -- the backend validates the Bearer token.
        proxy_set_header Authorization     $http_authorization;
        # Clear proxy headers to prevent clients from injecting them.
        proxy_set_header X-User-Email      "";
        proxy_set_header X-Proxy-Secret    "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        proxy_http_version     1.1;
        proxy_buffering        off;
        proxy_request_buffering off;

        # The trailing slash is critical: it strips the /ext prefix.
        # /ext/api/projects -> http://backend/api/projects
        proxy_pass    http://backend/;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # API documentation (optional auth)
    # -----------------------------------------------------------------------

    location ~ ^/(docs|redoc|openapi.json) {
        # Uncomment to require authentication for API docs:
        # auth_request     /oauth2/auth;
        # auth_request_set $user_email $upstream_http_x_auth_request_email;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_pass http://backend;
    }

    # -----------------------------------------------------------------------
    # Frontend (OAuth required for all browser access)
    # -----------------------------------------------------------------------

    location / {
        auth_request     /oauth2/auth;
        auth_request_set $user_email    $upstream_http_x_auth_request_email;
        auth_request_set $auth_cookie   $upstream_http_set_cookie;
        add_header       Set-Cookie     $auth_cookie;

        proxy_set_header X-User-Email   $user_email;
        proxy_set_header X-Proxy-Secret "YOUR_SHARED_SECRET_HERE";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_pass http://backend;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    location = /favicon.ico {
        proxy_pass http://backend;
        expires 1y;
        access_log off;
    }
}

# ===========================================================================
# HOW IT WORKS
# ===========================================================================
#
# Two separate location blocks handle two auth methods:
#
# /api/ (OAuth path):
#   auth_request sends a sub-request to oauth2-proxy on port 4180.
#   On success, nginx sets X-User-Email (from the OAuth email claim) and
#   X-Proxy-Secret, then forwards to the backend.  The backend uses proxy
#   auth (get_current_user checks headers).
#
# /ext/ (API key path):
#   No auth_request.  The Authorization header passes through to the
#   backend unchanged.  The trailing slash on proxy_pass strips /ext/
#   so the backend only sees /api/... paths.  The backend validates the
#   API key directly (get_current_user checks Bearer first).
#
# The backend has no knowledge of /ext/.  It always sees /api/... requests.
#
# ===========================================================================
# TESTING
# ===========================================================================
#
# Test OAuth (browser):
#   Open https://yourdomain.com in a browser.
#   Should redirect to OAuth, then show the app.
#
# Test API key (script):
#   curl -H "Authorization: Bearer YOUR_API_KEY" \
#        https://yourdomain.com/ext/api/projects
#   Should return 200 without any OAuth redirect.
#
# Test health (no auth):
#   curl https://yourdomain.com/api/health
#   Should return 200.
#
# Test privilege boundary:
#   curl -H "Authorization: Bearer YOUR_API_KEY" \
#        -X POST https://yourdomain.com/ext/api/api-keys \
#        -H "Content-Type: application/json" \
#        -d '{"name": "test"}'
#   Should return 403 (API keys cannot manage API keys).
#
# Verify config syntax:
#   nginx -t
#
# ===========================================================================
# CHOOSING A DIFFERENT PREFIX
# ===========================================================================
#
# The /ext/ prefix is just a suggestion.  You can use any prefix:
#   /token/    -- token-based access
#   /key/      -- API key access
#   /v1/       -- versioned external API
#
# Just update the location block name and document it for your users.
#
# ===========================================================================
# ALTERNATIVE: Basic Auth (simpler, less secure)
# ===========================================================================
#
# If you don't use OAuth2 Proxy, you can use nginx basic auth for the /api/
# location.  The username must be the user's email address.
#
# server {
#     listen 443 ssl http2;
#     server_name yourdomain.com;
#     # ... SSL config ...
#
#     auth_basic "VISTA";
#     auth_basic_user_file /etc/nginx/.htpasswd;
#
#     location /api/ {
#         # $remote_user is the basic-auth username (= email)
#         proxy_set_header X-User-Email   $remote_user;
#         proxy_set_header X-Proxy-Secret "YOUR_SHARED_SECRET_HERE";
#         proxy_set_header Authorization  "";
#         proxy_http_version 1.1;
#         proxy_pass http://backend;
#     }
#
#     location /ext/ {
#         # No auth -- backend validates Bearer token
#         proxy_set_header Authorization  $http_authorization;
#         proxy_set_header X-User-Email   "";
#         proxy_set_header X-Proxy-Secret "";
#         proxy_pass http://backend/;
#     }
# }
